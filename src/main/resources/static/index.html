<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatApp — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --green-light: #DCF8C6;
    --bg: #0a0f0d;
    --surface: #111a16;
    --surface2: #1a2820;
    --border: rgba(37,211,102,0.15);
    --text: #e8f5e2;
    --text-muted: #7a9e84;
    --font: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(37,211,102,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(18,140,126,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Floating dots pattern */
  .dots {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(37,211,102,0.12);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(37,211,102,0.05);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    justify-content: center;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--green);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 8px 24px rgba(37,211,102,0.3);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--green); }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 32px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 9px;
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 12px rgba(37,211,102,0.3);
  }

  /* Form */
  .form { display: none; flex-direction: column; gap: 16px; }
  .form.active { display: flex; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input {
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    transition: all 0.2s;
    outline: none;
  }

  input::placeholder { color: var(--text-muted); }

  input:focus {
    border-color: var(--green);
    background: rgba(37,211,102,0.05);
    box-shadow: 0 0 0 3px rgba(37,211,102,0.1);
  }

  .btn {
    margin-top: 8px;
    padding: 15px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: #20c45a;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(37,211,102,0.35);
  }

  .btn:active { transform: translateY(0); }

  .btn.loading { pointer-events: none; opacity: 0.7; }

  .msg {
    text-align: center;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
  }

  .msg.success { background: rgba(37,211,102,0.1); color: var(--green); display: block; }
  .msg.error { background: rgba(255,80,80,0.1); color: #ff6b6b; display: block; }
</style>
</head>
<body>

<div class="dots" id="dots"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">Chat<span>App</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- Login Form -->
  <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Enter your username" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required/>
    </div>
    <div class="msg" id="loginMsg"></div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
  </form>

  <!-- Register Form -->
  <form class="form" id="registerForm" onsubmit="handleRegister(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="Choose a username" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Choose a password" required/>
    </div>
    <div class="msg" id="registerMsg"></div>
    <button type="submit" class="btn" id="registerBtn">Create Account</button>
  </form>
</div>

<script>
  // Floating dots
  const dotsEl = document.getElementById('dots');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const size = Math.random() * 6 + 3;
    d.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    dotsEl.appendChild(d);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('registerForm').classList.toggle('active', tab==='register');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.textContent = 'Signing in...';
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const text = await res.text();
      if (res.ok) {
        sessionStorage.setItem('username', username);
        showMsg('loginMsg', '✓ ' + text, 'success');
        setTimeout(() => window.location.href = '/chat.html', 800);
      } else {
        showMsg('loginMsg', text, 'error');
        btn.classList.remove('loading');
        btn.textContent = 'Sign In';
      }
    } catch {
      showMsg('loginMsg', 'Connection error. Is the server running?', 'error');
      btn.classList.remove('loading');
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.classList.add('loading');
    btn.textContent = 'Creating account...';
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const text = await res.text();
      if (res.ok) {
        showMsg('registerMsg', '✓ Account created! Please sign in.', 'success');
        setTimeout(() => switchTab('login'), 1200);
      } else {
        showMsg('registerMsg', text, 'error');
      }
    } catch {
      showMsg('registerMsg', 'Connection error. Is the server running?', 'error');
    }
    btn.classList.remove('loading');
    btn.textContent = 'Create Account';
  }
</script>
</body>
</html>
